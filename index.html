<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meghana | Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
</head>
<body class="bg-dark">
    <!-- Hero Section -->
    <section id="hero" class="hero-section">
        <div class="bg-text-container">
            <div class="bg-text left">PORT</div>
            <div class="bg-text right">FOLIO</div>
        </div>
        <div class="container hero-container">
            <div class="hero-image-wrapper glass">
                <img src="hero.jpg" alt="Meghana" class="hero-image">
            </div>
            <div class="hero-content text-center">
                <div class="badge-row">
                    <span class="badge glass">HYDERABAD, TELANGANA</span>
                    <span class="badge glass status-badge"><span class="dot"></span> OPEN TO WORK</span>
                </div>
                <h1 class="hero-title">Meghana</h1>
                <a href="Meghana_Guptha_CV.pdf" download="Meghana_Guptha_CV.pdf" target="_blank" class="cv-download-btn glass">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    Download CV
                </a>
            </div>
        </div>

    </section>

    <!-- About Section -->
    <section id="about" class="section">
        <div class="container">
            <h2 class="section-title">ABOUT ME</h2>
            <div class="about-grid">
                <div class="about-bio glass">
                    <p id="about-text"></p>
                </div>
                <div class="skills-grid" id="skills-container"></div>
            </div>
        </div>
    </section>

    <!-- Projects Section -->
    <section id="projects" class="section bg-alt">
        <div class="container">
            <h2 class="section-title">PROJECTS</h2>
            <div class="projects-list" id="projects-container"></div>
        </div>
    </section>

    <!-- Experience Section -->
    <section id="experience" class="section">
        <div class="container">
            <h2 class="section-title">EXPERIENCE</h2>
            <div class="tabs-container glass">
                <div class="tabs-header" id="experience-tabs"></div>
                <div class="tab-content" id="experience-content"></div>
            </div>
        </div>
    </section>

    <!-- Education Section -->
    <section id="education" class="section bg-alt">
        <div class="container">
            <h2 class="section-title">EDUCATION</h2>
            <div class="education-timeline" id="education-container"></div>
        </div>
    </section>

    <!-- Certifications Section -->
    <section id="certifications" class="section">
        <div class="container">
            <h2 class="section-title">CERTIFICATIONS</h2>
            <div class="cert-grid" id="cert-container"></div>
        </div>
    </section>

    <!-- Achievements Section -->
    <section id="achievements" class="section bg-alt">
        <div class="container">
            <h2 class="section-title">ACHIEVEMENTS</h2>
            <ul class="achievements-list glass" id="achievements-container"></ul>
        </div>
    </section>

    <!-- Contact Section -->
    <section id="contact" class="section">
        <div class="container text-center">
            <h2 class="section-title">CONTACT ME</h2>
            <p class="tagline">Let's build something great together.</p>
            <div class="social-links">
                <a id="linkedin-link" target="_blank" class="glass-btn">LinkedIn</a>
                <a id="github-link" target="_blank" class="glass-btn">GitHub</a>
                <a id="email-link" target="_blank" class="glass-btn">Email</a>
                <a id="phone-link" target="_blank" class="glass-btn">Phone</a>
            </div>
            <div class="social-links" style="margin-top: 1rem;">
                <a href="https://mail.google.com/mail/?view=cm&fs=1&to=meghanaeruvanti9555@gmail.com" target="_blank" class="glass-btn primary">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    Gmail
                </a>
                <a href="https://outlook.office.com/mail/deeplink/compose?to=meghanaeruvanti9555@gmail.com" target="_blank" class="glass-btn primary">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    Outlook
                </a>
            </div>
        </div>
    </section>

    <!-- Theme Toggle -->
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
        <svg id="theme-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
    </button>

    <script src="script.js"></script>
</body>
</html>
